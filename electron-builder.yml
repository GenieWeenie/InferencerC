appId: com.inferencer.app
productName: InferencerC
copyright: Copyright © 2025

directories:
  buildResources: build
  output: dist
afterPack: scripts/release/afterPack.js

files:
  - dist/main/**/*
  - dist/renderer/**/*
  - dist/server/**/*
  - dist/shared/**/*
  - package.json
  - node_modules/**/*

win:
  target:
    - target: nsis
      arch:
        - x64
        - ia32
  icon: build/icon.ico
  requestedExecutionLevel: requireAdministrator

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: InferencerC
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  deleteAppDataOnUninstall: false

portable:
  artifactName: "${productName}-${version}-portable.${ext}"

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: build/icon.icns
  category: public.app-category.developer-tools

linux:
  target:
    - AppImage
    - deb
    - rpm
  maintainer: GenieWeenie <152430369+GenieWeenie@users.noreply.github.com>
  icon: build/icon.png
  category: Development

publish:
  provider: github
  owner: GenieWeenie
  repo: InferencerC
  releaseType: release
