name: Release Pipeline

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release_gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches app version
        if: startsWith(github.ref, 'refs/tags/')
        run: bash ./scripts/qa/verify_release_version.sh

      - name: Run release QA gate (tests + build + UI smoke)
        run: npm run qa:release:gate

      - name: Upload smoke QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-qa-artifacts-gate
          path: |
            output/playwright/smoke/**
          if-no-files-found: warn

  build_artifacts:
    needs: release_gate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
            build_command: npm run build:win
          - os: macos-latest
            label: macos
            build_command: npm run build:mac

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.label }} release
        run: ${{ matrix.build_command }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload ${{ matrix.label }} release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}-artifacts
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml
            dist/*.dmg
            dist/*.dmg.blockmap
            dist/latest-mac.yml
            dist/*.zip
            dist/*.zip.blockmap
          if-no-files-found: warn

  release_publish:
    needs: build_artifacts
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*-artifacts
          merge-multiple: true
          path: release-artifacts

      - name: Generate release notes
        run: bash ./scripts/release/generate_release_notes.sh output/release/release-notes.md

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          name: InferencerC ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: output/release/release-notes.md
          fail_on_unmatched_files: false
          files: |
            release-artifacts/**
